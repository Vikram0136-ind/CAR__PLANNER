<!DOCTYPE html>
<html>
<head>
    <title>Car Planner</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        form {
            margin-top: 30px;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🚗 Car Planner</h1>

<form action="/recommend" method="POST">
    <input type="number" name="budget" placeholder="Enter Budget" required>

    <select name="fuel">
        <option>Petrol</option>
        <option>Diesel</option>
        <option>Electric</option>
    </select>

    <br>
    <button type="submit">Get Cars 🚀</button>
</form>

</body>
</html>
